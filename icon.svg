<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0b0e11"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="60%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
  </defs>
  <!-- Syringe body -->
  <rect x="180" y="140" width="160" height="220" rx="12" fill="none" stroke="url(#g1)" stroke-width="8"/>
  <rect x="196" y="156" width="128" height="150" rx="8" fill="url(#g1)" opacity="0.15"/>
  <!-- Needle -->
  <rect x="244" y="360" width="24" height="60" rx="4" fill="url(#g1)"/>
  <!-- Plunger -->
  <rect x="180" y="120" width="160" height="28" rx="8" fill="url(#g1)" opacity="0.7"/>
  <line x1="244" y1="100" x2="268" y2="100" stroke="url(#g1)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="100" x2="256" y2="120" stroke="url(#g1)" stroke-width="8" stroke-linecap="round"/>
  <!-- Measurement lines -->
  <line x1="180" y1="230" x2="160" y2="230" stroke="url(#g1)" stroke-width="5" opacity="0.8"/>
  <line x1="180" y1="270" x2="160" y2="270" stroke="url(#g1)" stroke-width="5" opacity="0.8"/>
  <line x1="340" y1="230" x2="360" y2="230" stroke="url(#g1)" stroke-width="5" opacity="0.8"/>
  <line x1="340" y1="270" x2="360" y2="270" stroke="url(#g1)" stroke-width="5" opacity="0.8"/>
  <!-- Candle chart inside -->
  <rect x="210" y="200" width="10" height="50" rx="3" fill="#00c853" opacity="0.9"/>
  <rect x="235" y="220" width="10" height="40" rx="3" fill="#ff3d00" opacity="0.9"/>
  <rect x="260" y="185" width="10" height="65" rx="3" fill="#00c853" opacity="0.9"/>
  <rect x="285" y="210" width="10" height="45" rx="3" fill="#ff3d00" opacity="0.9"/>
  <rect x="310" y="195" width="10" height="55" rx="3" fill="#00c853" opacity="0.9"/>
</svg>
